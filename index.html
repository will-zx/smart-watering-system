<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Greenhouse Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-emerald-600 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">🌿 Smart Greenhouse Panel</h1>
            <span class="bg-emerald-700 px-3 py-1 rounded text-sm font-semibold">Live Monitoring</span>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-6 space-y-6">
        
        <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-gray-700">Grafik Tren Sensor (Real-time)</h2>
                <span class="text-xs text-gray-400">Update berkala dari ESP32</span>
            </div>
            <div class="relative h-80 w-full">
                <canvas id="sensorChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-4 md:p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-700">Histori Data Log Sensor</h2>
                <button onclick="fetchDataLogs()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs px-3 py-1.5 rounded transition">
                    🔄 Refresh Data
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-xs uppercase font-semibold border-b border-gray-200">
                            <th class="p-4">Waktu</th>
                            <th class="p-4">Suhu (°C)</th>
                            <th class="p-4">Kelembapan (%)</th>
                            <th class="p-4">VPD (kPa)</th>
                            <th class="p-4">ET0 (mm/day)</th>
                            <th class="p-4">Status Sistem</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody" class="text-sm divide-y divide-gray-100">
                        <tr>
                            <td colspan="6" class="p-4 text-center text-gray-400">Memuat data log...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 1. KONFIGURASI SUPABASE
        // Ganti dengan URL dan Anon Key yang kamu dapatkan dari Dashboard Supabase kamu
        const SUPABASE_URL = "https://qhfuwzwjbcvlvhqikjtf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Ntnx7wzNhJtOIMpCNLP2yA_Z0V-rrhC";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. INISIALISASI CHART.JS
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const sensorChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Label Waktu (X-Axis)
                datasets: [
                    {
                        label: 'Suhu (°C)',
                        data: [],
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Kelembapan (%)',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.3,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: { display: true, text: 'Suhu (°C)' }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        grid: { drawOnChartArea: false }, // Agar grid tidak tumpang tindih
                        title: { display: true, text: 'Kelembapan (%)' }
                    }
                }
            }
        });

        // 3. FUNGSI UNTUK MENGAMBIL DATA DARI SUPABASE
        async function fetchDataLogs() {
            try {
                // Mengambil 20 data log sensor terakhir dari tabel 'sensor_logs'
                const { data, error } = await supabase
                    .from('sensor_logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) throw error;

                if (data) {
                    // Balik urutan data khusus untuk grafik agar berjalan dari kiri (lama) ke kanan (baru)
                    const chartData = [...data].reverse();

                    // Update Data Grafik
                    sensorChart.data.labels = chartData.map(log => {
                        const date = new Date(log.created_at);
                        return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    });
                    sensorChart.data.datasets[0].data = chartData.map(log => log.temperature);
                    sensorChart.data.datasets[1].data = chartData.map(log => log.humidity);
                    sensorChart.update();

                    // Update Data Tabel Log
                    const tableBody = document.getElementById('logTableBody');
                    tableBody.innerHTML = ''; // Kosongkan placeholder awal

                    data.forEach(log => {
                        const date = new Date(log.created_at).toLocaleString('id-ID');
                        
                        // Set warna badge status sistem
                        let statusColor = "bg-gray-100 text-gray-800";
                        if (log.status_sistem.includes("MISTING")) statusColor = "bg-blue-100 text-blue-800 font-semibold";
                        if (log.status_sistem.includes("BLOWER")) statusColor = "bg-amber-100 text-amber-800 font-semibold";

                        const row = `
                            <tr class="hover:bg-gray-50 transition">
                                <td class="p-4 font-medium text-gray-600">${date}</td>
                                <td class="p-4 text-red-500 font-semibold">${log.temperature}</td>
                                <td class="p-4 text-blue-500 font-semibold">${log.humidity}</td>
                                <td class="p-4 text-purple-600">${log.vpd}</td>
                                <td class="p-4 text-orange-600">${log.et0}</td>
                                <td class="p-4">
                                    <span class="px-2.5 py-1 rounded-full text-xs ${statusColor}">
                                        ${log.status_sistem}
                                    </span>
                                </td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (err) {
                console.error("Gagal memuat data:", err.message);
            }
        }

        // Jalankan fungsi saat halaman pertama kali dibuka
        window.onload = () => {
            fetchDataLogs();
            // Opsional: Lakukan refresh otomatis setiap 30 detik
            setInterval(fetchDataLogs, 30000);
        };
    </script>
</body>
</html>
